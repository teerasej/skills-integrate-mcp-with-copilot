<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <div id="session-controls" class="session-controls hidden">
        <span id="current-user"></span>
        <button id="logout-btn" type="button">Log Out</button>
      </div>
    </header>

    <main>
      <section id="auth-container">
        <h3>Account Access</h3>
        <div id="auth-message" class="hidden"></div>

        <div id="auth-tabs" class="auth-tabs">
          <button id="login-tab" class="tab-btn active" type="button">Login</button>
          <button id="register-tab" class="tab-btn" type="button">Register</button>
        </div>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label for="login-identifier">Username or Email:</label>
            <input type="text" id="login-identifier" required placeholder="student or student@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="login-password">Password:</label>
            <input type="password" id="login-password" required placeholder="Enter password" />
          </div>
          <button type="submit">Login</button>
        </form>

        <form id="register-form" class="auth-form hidden">
          <div class="form-group">
            <label for="register-username">Username:</label>
            <input type="text" id="register-username" required placeholder="Choose a username" />
          </div>
          <div class="form-group">
            <label for="register-email">Email:</label>
            <input type="email" id="register-email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="register-password">Password:</label>
            <input type="password" id="register-password" required placeholder="At least 8 characters" />
          </div>
          <button type="submit">Create Account</button>
        </form>
      </section>

      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <p id="signup-note" class="info">Log in to sign up or unregister from activities.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required readonly />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
